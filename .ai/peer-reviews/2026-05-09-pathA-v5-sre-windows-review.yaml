    - id: E_S3
      severity: should_complete_before_install
      action: "E4 — driver-rank empirical test on probe machine."
    - id: E_S4
      severity: must_complete_before_install
      action: "E5 — confirm what's actually paired on user's machine (read-only)."

  optional_strategic:
    - id: ST1
      consideration: |
        Session 19 already demonstrated PATH-A delivers battery on v3 (40%
        empirical). PATH-B (PRD-26 userland recycler) is in_progress on
        branch ai/prd-26-path-b-userland-recycler and reportedly produces
        Mode A (battery readable) without a custom kernel filter. If
        PATH-B works for the user's daily-driver use case, the marginal
        value of PATH-A is whether it produces a more-stable Mode A or a
        better single-shot read pattern. The BSOD risk for the user's
        only test machine may not be worth that incremental gain.
        This is a strategic judgment for the user, not a technical verdict.
      action_for_user: |
        Decide: is PATH-A required for ship, or is PATH-B sufficient? If
        PATH-B sufficient, PATH-A becomes Phase 2 R&D (no daily-driver
        install pressure).

predicted_failure_modes_if_user_proceeds_unchanged:
  outcome_distribution_estimate:
    benign_no_op: 60%
      - "WHQL ranking wins. Our INF installed but not bound to v3. No behavior change. Tray sees no difference, no BSOD."
    bsod_same_as_before: 25%
      - "Our INF binds. v1 cross-loads our patched binary via shared service name. v1 enumeration triggers F2 NULL-deref the same way as 2026-05-08."
    ci_hard_block: 10%
      - "STATUS_INVALID_IMAGE_HASH on the WHQL-corrupted PE. Install fails with no behavior change."
    plan_works: 5%
      - "Our INF binds, WHQL fallback to cat works, v1 doesn't cross-fire (e.g., not paired), BSOD doesn't reproduce."
  recommendation_given_distribution: |
    Most likely outcome ("benign no-op") wastes the install attempt's effort.
    Most likely "bad" outcome (25%) reproduces the BSOD that took ~30 min to
    recover from twice. The 5% "plan works" outcome doesn't justify the
    expected-value ratio.

verdict: REJECT (CHANGES-NEEDED, structural)
strength: HIGH — based on direct comparison of two INF files and disasm trace
do_not_install: true
required_changes_summary: |
  1. Rename service + binary in our INF (S1) — fundamental isolation primitive
  2. Fix startup-repair.ps1 PID iteration (S2)
  3. Add BTHPORT cache invalidation step (S3)
  4. Disable Fast Startup before any install (S4)
  5. Post-install verification block (S5)
  6. Static analysis pass on F2 (E_S1) — identify NULL+len=4 producer
  7. Gate-zero CI-probe on probe machine (E_S2)
  8. Driver-rank empirical confirmation (E_S3)
  9. Confirm v1 currently paired (E_S4)

  After all the above complete with green outcomes, re-review the design
  before any install attempt on the user's daily driver.

notes_to_user: |
  This review reaches its conclusions from primary evidence (disasm + INFs +
  empirical timeline) WITHOUT anchoring on H-027c, H-028, H-029, or any
  prior peer-review verdict. I am not claiming the "true root cause" of the
  BSODs — I am claiming the v5 install plan as written cannot achieve the
  isolation it claims, and the BSOD mechanism is not yet localized enough
  to certify v5 as safe.

  The most surprising finding for me was OQ2 (service-name reuse defeats
  v3-only isolation). This is mechanical, not subtle, and would be obvious
  to any reviewer reading the two INFs side by side. I recommend you read
  the two INFs side by side yourself to confirm — they are short and the
  comparison takes about five minutes.

  If the user wishes to proceed despite this verdict: at minimum complete
  S1 (rename service) + E_S4 (confirm v1 paired). Without S1, BSOD #2
  reproduction risk is in the 25% range per my estimate.
